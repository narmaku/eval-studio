name: RHEL Sysadmin RAG Evaluation
description: Questions about RHEL system administration for testing RAG evaluation
version: "1.0"
items:
  - question: "How do I check the status of a systemd service?"
    expected_answer: "Use 'systemctl status <service-name>' to check a systemd service. This shows active state, PID, memory usage, and recent logs."
  - question: "What are the SELinux modes and how do I change them?"
    expected_answer: "SELinux has three modes: Enforcing, Permissive, and Disabled. Check with 'getenforce'. Temporarily change with 'setenforce 0'. Permanently change in /etc/selinux/config."
  - question: "How do I open a firewall port in RHEL?"
    expected_answer: "Use firewalld: 'firewall-cmd --add-service=http --permanent' to allow a service, then 'firewall-cmd --reload' to apply. Check rules with 'firewall-cmd --list-all'."
  - question: "What is the package manager in RHEL 8+?"
    expected_answer: "DNF (Dandified YUM) is the package manager. Key commands: 'dnf install', 'dnf update', 'dnf remove', 'dnf search', 'dnf info'."
  - question: "How do I create a user and add them to a group?"
    expected_answer: "Create user with 'useradd <username>', set password with 'passwd <username>', add to group with 'usermod -aG <group> <username>'. User data in /etc/passwd."
  - question: "How do I run containers in RHEL without Docker?"
    expected_answer: "Use Podman, a daemonless container tool. Commands: 'podman run', 'podman ps', 'podman build'. Supports rootless containers for security."
  - question: "How do I configure a static IP address?"
    expected_answer: "Use NetworkManager: 'nmcli connection modify eth0 ipv4.addresses 192.168.1.100/24 ipv4.method manual'. Config files in /etc/NetworkManager/."
  - question: "How do I view system logs?"
    expected_answer: "Use journalctl. Filter by service: 'journalctl -u sshd', by time: 'journalctl --since today', by priority: 'journalctl -p err', follow: 'journalctl -f'."
  - question: "How do I manage LVM volumes?"
    expected_answer: "LVM hierarchy: PV -> VG -> LV. Create with pvcreate, vgcreate, lvcreate. Extend with lvextend. Resize filesystem with resize2fs."
  - question: "How do I harden RHEL security?"
    expected_answer: "Use OpenSCAP for compliance scanning, enable FIPS mode, configure audit rules, use AIDE for file integrity, and set crypto-policies."
