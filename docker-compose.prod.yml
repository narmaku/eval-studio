# docker-compose.prod.yml -- Production deployment
# Usage:
#   docker build -f Containerfile -t eval-studio:latest .
#   docker compose -f docker-compose.prod.yml up -d

services:
  backend:
    image: eval-studio:latest
    ports:
      - "8000:8000"
    volumes:
      - eval-studio-data:/app/data:z
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/eval_studio.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:1-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:z,ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  eval-studio-data:
