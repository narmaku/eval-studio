name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Lint backend
        working-directory: backend
        run: |
          uv sync --quiet
          uv run ruff check .
          uv run ruff format --check .

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Lint frontend
        working-directory: frontend
        run: |
          npm ci --silent
          npm run lint

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Run backend tests
        working-directory: backend
        run: |
          uv sync --quiet
          uv run pytest -v --tb=short

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run frontend tests
        working-directory: frontend
        run: |
          npm ci --silent
          npm test -- --run

  container-smoke:
    name: Container Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build container image
        run: docker build -f Containerfile -t eval-studio:ci .

      - name: Run container and health check
        run: |
          docker run -d --name eval-studio-smoke \
            -p 8000:8000 \
            -e DATABASE_URL=sqlite+aiosqlite:///./data/eval_studio.db \
            -e LOG_LEVEL=WARNING \
            eval-studio:ci

          # Wait for container to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/health > /dev/null 2>&1; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for health check... ($i/30)"
            sleep 2
          done
          echo "Health check failed"
          docker logs eval-studio-smoke
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f eval-studio-smoke || true
